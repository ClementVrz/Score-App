<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Board Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Score Board Pro</h1>
        
        <div id="setup">
            <input type="number" id="numPlayers" placeholder="Nombre de joueurs">
            <button onclick="genererChamps()">Suivant</button>
            <div id="inputNames"></div>
        </div>

        <div id="game" style="display:none;">
            <div id="equipesContainer"></div>
            <table id="scoreTable">
                <thead><tr id="tableHead"></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
            <button onclick="ajouterManche()">+ Nouvelle manche</button>
            <div id="podium" class="podium-card"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
<div id="game" style="display:none;">
    <table id="scoreTable">
        <thead><tr id="tableHead"><th>Joueur</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
    <button onclick="ajouterManche()">+ Nouvelle manche</button>
    <div id="podium" class="podium-card"></div>
</div>
