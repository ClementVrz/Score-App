<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Board Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Score Board Pro</h1>
        
        <div id="setup">
            <input type="number" id="numPlayers" placeholder="Nombre de joueurs">
            <button onclick="genererChamps()">Valider</button>
            <div id="inputNames"></div>
        </div>

        <div id="game" style="display:none;">
            <div class="table-wrapper">
                <table id="scoreTable">
                    <thead><tr id="tableHead"><th>Joueur</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <button onclick="ajouterManche()">+ Nouvelle manche</button>
            <div id="podium" class="podium-card"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
