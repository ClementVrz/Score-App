<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Score Board Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1>Score Board Pro</h1>
        
        <div id="setup" class="card">
            <input type="number" id="nbJoueurs" placeholder="Nombre de joueurs">
            <input type="number" id="nbManches" placeholder="Nombre de manches">
            <select id="modeJeu">
                <option value="max">Gagnant = Plus gros score</option>
                <option value="min">Gagnant = Plus petit score</option>
            </select>
            <button onclick="validerConfig()">Valider la configuration</button>
            <div id="configDetails"></div>
        </div>

        <div id="game" class="card" style="display:none;">
            <div class="table-container">
                <table id="scoreTable">
                    <thead><tr id="tableHead"><th>Manche</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <button id="btnValider" onclick="validerManche()">Valider la Manche</button>
            <div id="podium" class="podium-card"></div>
            <div class="actions">
                <button class="secondary" onclick="recommencer()">Recommencer</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
